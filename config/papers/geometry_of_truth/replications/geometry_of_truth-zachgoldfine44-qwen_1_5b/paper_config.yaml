# =============================================================================
# Paper Config: The Geometry of Truth: Emergent Linear Structure in LLM
# Representations of True/False Datasets
# Samuel Marks & Max Tegmark, 2023 (arXiv:2310.06824).
#
# Original study: LLaMA-2 7B/13B/70B, probes on residual-stream activations over
# end-of-sentence punctuation, ~10 curated + uncurated true/false datasets.
# Replication scope (this file): 2 core claims on Qwen-2.5-1.5B-Instruct local.
# =============================================================================

paper:
  id: "geometry_of_truth"
  title: "The Geometry of Truth: Emergent Linear Structure in LLM Representations of True/False Datasets"
  authors: "Samuel Marks, Max Tegmark"
  url: "https://arxiv.org/abs/2310.06824"
  original_model: "LLaMA-2 7B / 13B / 70B (base)"
  model_variant: "instruct"  # We substitute Qwen-2.5-1.5B-Instruct for this run
  paper_text_path: "paper.md"

# This file is the configuration for ONE specific replication attempt of
# the above paper. A separate replication of the same paper already
# lives at config/papers/geometry_of_truth/replications/geometry_of_truth-tulaneadam-qwen_1_5b/
# — the two coexist and are compared row-by-row in the README table.
replication:
  id: "geometry_of_truth-zachgoldfine44-qwen_1_5b"
  replicator: "Zach Goldfine"
  github_handle: "zachgoldfine44"
  date: "2026-04-21"
  models_tested:
    - "qwen_1_5b"
  status: "v0.1 partial"
  summary: >
    Within-distribution probe replicates cleanly (0.99 on cities, layer 12
    — matches paper 13B/70B despite being 10x smaller). Cross-dataset
    generalization does NOT replicate at 1.5B: probe collapses to trivial
    predictions on sp_en_trans (92/100 "true"), flips sign on neg_cities
    (replicates paper's Fig 3c orthogonal-directions finding), collapses
    to all-false on larger_than. Consistent with paper's "at sufficient
    scale" framing.
  writeup_path: "writeup/geometry_of_truth/geometry_of_truth-zachgoldfine44-qwen_1_5b/draft.md"

# Mechinterp techniques required from src/techniques/
techniques_required:
  - probes           # Binary logistic regression over residual-stream activations
  - contrastive      # Mean-difference (true - false) concept vectors

# ─── Concept set: binary truth labels ───────────────────────────────────────
# Every stimulus is tagged with concept "true" or "false" matching the
# original dataset's 0/1 label. Chance on this binary task is 0.50.
truth_concepts:
  - "true"
  - "false"

claims:
  # ── Claim 1: Linear probes classify true/false (single-domain) ────────────
  # Paper finding: A logistic-regression probe on LLaMA-2-13B residual stream
  # over the final-punctuation token achieves high (>90%) held-out accuracy on
  # the `cities` dataset. Paper section: Figure 2, Section 4, Appendix D.
  # Our threshold: 0.70 (relaxed from paper's >0.90) — Qwen-1.5B is ~10× smaller
  # than the smallest LLaMA model the paper probed, and the paper explicitly
  # argues truth is linearly represented at SUFFICIENT SCALE. 0.70 is 20pts
  # above chance and would still constitute a clear positive signal.
  - id: "truth_probe_cities"
    description: >
      A logistic-regression probe trained on residual-stream activations
      can classify whether a single-topic factual statement ("The city of
      X is in Y.") is true or false, significantly above chance (50%).
      Paper reported >90% on LLaMA-2-13B cities.
    experiment_type: "probe_classification"
    paper_section: "Section 4, Figure 2, Appendix D"
    params:
      concept_set: ["true", "false"]
      # Stimuli on disk: 100 true + 100 false from cities.csv (seed=42). See
      # config/papers/geometry_of_truth/stimuli/training/{true,false}.json.
      n_stimuli_per_concept: 100
      probe_type: "logistic_regression"
      activation_source: "residual_stream"
      # Scan all 28 layers of Qwen-2.5-1.5B. The harness auto-subsamples to
      # ~9 evenly-spaced layers when n_layers > 16 — fine, this matches the
      # paper's finding that results are insensitive to middle-layer choice
      # as long as you scan broadly.
      layer_selection: "scan_all_or_subsample"
      # Aggregation: last-token, matching the paper's "over the final
      # punctuation token" extraction. Statements in the dataset end with
      # a period, so last-token ≈ period token.
      aggregation: "last_token"
      cross_validation_folds: 5
      train_test_split: 0.8
      seed: 42
    success_metric: "probe_accuracy"
    success_threshold: 0.70
    notes: >
      Paper used LLaMA-2-13B/70B at layer 15 (13B) with residual-stream
      activations over the final period. We scan layers and report the best
      layer for Qwen. If Claim 1 fails at 0.70, the replication attempt
      probably does not have the statistical power to meaningfully test
      generalization, and the run should be reported as a null result at
      this scale.

  # ── Claim 2: Cross-dataset generalization (the paper's headline finding) ──
  # Paper finding: Probes trained on one true/false dataset generalize to
  # structurally different ones. Table from Figure 5, Appendix D.
  # We measure generalization via diagonal dominance in the confusion matrix
  # on three held-out sets: sp_en_trans (different topic), neg_cities (same
  # topic, negated), larger_than (numeric comparison).
  #
  # Harness note: generalization_test runs on ONE test set per claim. We
  # pick sp_en_trans as the primary test (cleanest cross-domain transfer,
  # furthest from cities). Results on neg_cities and larger_than are
  # captured via the `also_evaluate` param for comparison but are not part
  # of the pass/fail decision.
  #
  # Our threshold: 0.50 diagonal dominance. The paper's numbers on 13B/70B
  # are substantially higher (sp_en_trans often >95%), but a 1.5B model may
  # transfer weakly or not at all. 0.50 is the majority-correct threshold,
  # consistent with how the emotions replication used it.
  - id: "truth_probe_generalization_sp_en_trans"
    description: >
      Probes trained on cities (single-topic city-country facts) generalize
      to Spanish-English translation statements. Paper reported this as
      strong cross-domain transfer, with LLaMA-2-70B exceeding 95%.
    experiment_type: "generalization_test"
    paper_section: "Figure 5, Appendix D"
    depends_on: "truth_probe_cities"
    params:
      training_stimulus_set: "training_stimuli"
      test_stimulus_set: "sp_en_trans"
      evaluation_method: "confusion_matrix"
    success_metric: "diagonal_dominance"
    success_threshold: 0.50
    notes: >
      Held-out test: sp_en_trans.json (50 true + 50 false, seed=42).
      Key question: is the probe direction a truth detector, or a
      cities-specific artifact?  Chance = 0.50 for binary. A
      diagonal dominance of 1.0 means both `true` and `false` held-out
      sentences are correctly majority-classified.

  # ── Claim 2b: Generalization to neg_cities (same-topic, negated) ──────────
  # Paper finding (Figure 3c): cities and neg_cities directions are
  # "approximately orthogonal" in LLaMA-2-13B and become more aligned in 70B.
  # This claim is informational — not gating. We report it for completeness
  # because the negated-topic transfer is a known failure mode in the paper.
  - id: "truth_probe_generalization_neg_cities"
    description: >
      Probes trained on cities generalize to the negated form of the same
      statements ("The city of X is not in Y."). Paper reports near-
      orthogonal directions in LLaMA-2-13B — we expect weak transfer.
    experiment_type: "generalization_test"
    paper_section: "Figure 3c, Appendix D"
    depends_on: "truth_probe_cities"
    params:
      training_stimulus_set: "training_stimuli"
      test_stimulus_set: "neg_cities"
      evaluation_method: "confusion_matrix"
    success_metric: "diagonal_dominance"
    success_threshold: 0.50
    notes: >
      Expected to be the HARDEST transfer target because the probe direction
      may have absorbed "affirmative city statement" rather than "true".
      A failure here replicates a known paper finding about 13B.

  # ── Claim 2c: Generalization to larger_than (numeric comparison) ──────────
  # Paper finding: larger_than is structurally different from cities but
  # still exhibits a linear truth direction; cross-training helps for 70B.
  - id: "truth_probe_generalization_larger_than"
    description: >
      Probes trained on cities generalize to numeric comparison statements
      ("x is larger than y."). Completely different semantic domain —
      cleanest test for a "domain-general" truth direction.
    experiment_type: "generalization_test"
    paper_section: "Figure 5, Appendix D"
    depends_on: "truth_probe_cities"
    params:
      training_stimulus_set: "training_stimuli"
      test_stimulus_set: "larger_than"
      evaluation_method: "confusion_matrix"
    success_metric: "diagonal_dominance"
    success_threshold: 0.50
    notes: >
      Totally different domain (numbers vs. geography). If the probe still
      transfers, that's evidence for an abstract truth feature even at 1.5B
      scale. Paper reports >95% transfer in 70B (trained on
      larger_than+smaller_than, tested on sp_en_trans).
