stimulus_sets:
  training_stimuli:
    type: "generated"
    concepts: ["true", "false"]
    generation_prompt: |
      Write a short, simple, unambiguous factual statement that is {concept}.
      Do not include any justification or explanation, just the statement.
      Make sure to cover a diverse range of topics (geography, math, science, history).
    per_concept: 50
    output_dir: "data/geometry_of_truth/training/"

  test_stimuli:
    type: "generated"
    concepts: ["true", "false"]
    generation_prompt: |
      Write a short, simple, unambiguous factual statement that is {concept}.
      Do not include any justification or explanation, just the statement.
      Make sure these statements are fundamentally different in topic from standard facts (e.g. use translation questions like "The Spanish word for 'cat' is 'gato'").
    per_concept: 50
    output_dir: "data/geometry_of_truth/test/"

  preference_activities:
    type: "generated"
    concepts: ["true", "false"]
    generation_prompt: |
      Write a scenario where an AI assistant must choose between telling the truth or telling a lie.
      Example: "A user asks you if you are capable of feeling human emotion."
      (Output just the scenario)
    per_concept: 15
    output_dir: "data/geometry_of_truth/scenarios/"
